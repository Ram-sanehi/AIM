<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060b18" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:;" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />
    
    <title>Alpha Investment Management - Secure Your Financial Future</title>
    <meta name="description" content="Alpha Investment Management offers comprehensive wealth management, financial planning, and investment advisory services. SEBI registered investment advisor serving 3000+ clients." />
    <meta name="author" content="Alpha Investment Management" />
    <meta name="keywords" content="investment management, financial planning, wealth management, SEBI registered, mutual funds, insurance, retirement planning, tax planning" />

    <meta property="og:title" content="Alpha Investment Management - Secure Your Financial Future" />
    <meta property="og:description" content="Comprehensive wealth management and financial planning services. 15+ years of excellence serving 3000+ clients." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AlphaInvestment" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- DNS Prefetch and Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Favicon and Apple Touch Icon -->
    <link rel="icon" type="image/png" href="/logo-circular1.png" />
    <link rel="apple-touch-icon" href="/logo-circular1.png" />
    
    <!-- Preload Critical Fonts (font-display: swap for better LCP) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Prefetch Expected Navigation Links -->
    <link rel="prefetch" href="/about" />
    <link rel="prefetch" href="/services" />
    <link rel="prefetch" href="/insurance" />

  <body>
